name = "content-mood-analyzer-ai-proxy"
main = "index.js"
compatibility_date = "2024-01-01"

# Created via: npx wrangler kv namespace create RATE_LIMIT
# Then paste the returned id below.
kv_namespaces = [
  { binding = "RATE_LIMIT", id = "REPLACE_WITH_KV_NAMESPACE_ID" }
]

# Secrets (never put real values here - set them with `wrangler secret put`):
#   GEMINI_API_KEY
#   PLUGIN_AUTH_TOKEN
#
# Optional plain var, safe to set here if you want a non-default model:
# [vars]
# GEMINI_MODEL = "gemini-2.5-flash"
